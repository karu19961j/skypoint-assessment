services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # `${VAR:?msg}` makes `docker compose up` refuse to start when the
      # variable is missing instead of silently passing through nothing.
      # If you see a "required variable POSTGRES_USER is missing" error,
      # run `cp .env.example .env` and try again.
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - jobportal

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    # `server /data` runs the storage daemon; `--console-address :9001`
    # exposes the web console internally so an operator can `docker exec`
    # in for a poke without us mapping a host port for it.
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    volumes:
      - miniodata:/data
    # MinIO is reached only by the backend over the docker network — no
    # host port mapping, no browser exposure. The console is also kept
    # internal-only; reach it via `docker exec` if you need to look at it.
    expose:
      - "9000"
      - "9001"
    networks:
      - jobportal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SEED_HR_EMAIL: ${SEED_HR_EMAIL:?required}
      SEED_HR_PASSWORD: ${SEED_HR_PASSWORD:?required}
      SEED_CANDIDATE_EMAIL: ${SEED_CANDIDATE_EMAIL:?required}
      SEED_CANDIDATE_PASSWORD: ${SEED_CANDIDATE_PASSWORD:?required}
      ALLOW_HR_SELF_REGISTER: ${ALLOW_HR_SELF_REGISTER:-false}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?required}
      MINIO_BUCKET: ${MINIO_BUCKET:-resumes}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      RESUME_MAX_BYTES: ${RESUME_MAX_BYTES:-15728640}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - "8000"
    healthcheck:
      # `docker inspect` reports the backend's health (ops can use it),
      # but the frontend deliberately does NOT gate on it: nginx retries
      # the upstream during the first second of startup, which is
      # plenty for the bootstrap to finish. 30s interval keeps the
      # probe quiet — the uvicorn access filter in main.py also drops
      # /api/health entries from the access log entirely.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health | grep -q '\"db\":\"ok\"'"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - jobportal

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - jobportal

volumes:
  pgdata:
  miniodata:

networks:
  jobportal:
    driver: bridge
