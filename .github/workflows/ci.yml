name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobportal
          POSTGRES_PASSWORD: jobportal_dev_password
          POSTGRES_DB: jobportal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobportal -d jobportal"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://jobportal:jobportal_dev_password@localhost:5432/jobportal
      JWT_SECRET: ci-only-not-a-real-secret
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: 30
      CORS_ORIGINS: http://localhost:5173
      SEED_HR_EMAIL: hr@test.com
      SEED_HR_PASSWORD: Hr@1234
      SEED_CANDIDATE_EMAIL: candidate@test.com
      SEED_CANDIDATE_PASSWORD: Candidate@1234
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest

  frontend:
    name: Frontend (build + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run Vitest
        working-directory: frontend
        run: npm test -- --run

      - name: Production build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker stack builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage .env
        run: cp .env.example .env
      - name: Build all services
        run: docker compose build
